# 首次部署（尚未申请 SSL）时使用此配置
# certbot 成功后换用 agentshieldtop.xyz.conf
# upstream 见 agentshield-upstream.conf

server {
    listen 80;
    listen [::]:80;
    server_name agentshieldtop.xyz www.agentshieldtop.xyz;

    root /var/www/agentshield;
    index index.html;

    # Let's Encrypt 验证（须优先于 location /，且目录可写）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /api/ {
        proxy_pass http://agentshield_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://agentshield_backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
