# AgentShield 公网 IP + 端口访问（无需域名、无需备案）
# 访问: http://114.215.209.144:8088
# 安装:
#   sudo cp deploy/nginx/agentshield-ip-8088.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/agentshield-ip-8088.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# 阿里云防火墙放行 TCP 8088
# upstream 见 agentshield-upstream.conf（勿在本文件重复定义）

server {
    listen 8088;
    listen [::]:8088;
    server_name _;

    root /var/www/agentshield;
    index index.html;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://agentshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://agentshield_backend;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
