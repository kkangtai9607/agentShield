# AgentShield @ agentshieldtop.xyz
# 与现有 nginx 站点并存：本配置仅占用 8001 端口 + 独立 server_name
# 安装：sudo cp deploy/nginx/agentshieldtop.xyz.conf /etc/nginx/sites-available/
#       sudo ln -sf /etc/nginx/sites-available/agentshieldtop.xyz.conf /etc/nginx/sites-enabled/
# 证书：sudo certbot --nginx -d agentshieldtop.xyz -d www.agentshieldtop.xyz
# upstream 见 agentshield-upstream.conf

# HTTP → HTTPS（certbot 会自动补充 ssl 块；首次可先只 listen 80 跑 certbot）
server {
    listen 80;
    listen [::]:80;
    server_name agentshieldtop.xyz www.agentshieldtop.xyz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agentshieldtop.xyz www.agentshieldtop.xyz;

    # certbot 部署后路径（按实际证书路径调整）
    ssl_certificate     /etc/letsencrypt/live/agentshieldtop.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentshieldtop.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/agentshield;
    index index.html;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location /api/ {
        proxy_pass http://agentshield_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://agentshield_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
