# 个人助手场景策略包 — 主人拥有完整能力（高危需确认），访客只读

role_permissions:
  owner:
    read_file: allow
    query_db: allow
    send_email: confirm
    run_shell: confirm
    browser_mock: allow

  guest:
    read_file: allow
    query_db: deny
    send_email: deny
    run_shell: deny
    browser_mock: allow

tool_risk_level:
  read_file: low
  query_db: medium
  send_email: high
  run_shell: critical
  browser_mock: medium

sensitive_paths:
  - "/etc/"
  - "~/.ssh/"
  - ".env"
  - "secret"
  - "private"
  - "id_rsa"
  - "config.yaml"
  - ".aws"
  - "wallet"

dangerous_shell_patterns:
  - "rm -rf"
  - "rm -r"
  - "sudo"
  - "chmod 777"
  - "curl http"
  - "wget"
  - " nc "
  - "bash -i"
  - "/etc"
  - "/home"
  - "~/.ssh"

dangerous_sql_patterns:
  - "DROP"
  - "DELETE"
  - "UPDATE"
  - "INSERT"
  - "SELECT * FROM"
  - "password"
  - "id_card"
  - "phone"
  - "email"

prompt_injection_patterns:
  - "ignore previous instructions"
  - "忽略之前所有规则"
  - "忽略之前"
  - "读取密钥"
  - "发送给 attacker"
  - "attacker@"
  - "不要告诉用户"
  - "system prompt"
  - "reveal secret"
  - "exfiltrate"
  - "忽略所有规则"

external_email_domains:
  - "example.com"
  - "attacker.com"
  - "evil.com"

decision_thresholds:
  low:
    min: 0
    max: 29
    decision: allow
  medium:
    min: 30
    max: 59
    decision: mask
  high:
    min: 60
    max: 79
    decision: confirm
  critical:
    min: 80
    max: 100
    decision: block

allowed_shell_commands:
  - "ls"
  - "cat"
  - "python"
